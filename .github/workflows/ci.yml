name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm test

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Render templates with placeholder values
        run: |
          mkdir -p .ci-rendered
          for tmpl in templates/workflow*.yml.tmpl; do
            out=".ci-rendered/$(basename "${tmpl%.tmpl}")"
            sed -e 's/{{PROJECT_DESCRIPTION}}/A test project./g' \
                -e 's/{{LANGUAGE_HINTS}}//g' \
                "$tmpl" > "$out"
          done
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -version
      - name: Lint templates
        run: ./actionlint .ci-rendered/*.yml
      - name: Lint own workflows
        run: ./actionlint .github/workflows/*.yml
