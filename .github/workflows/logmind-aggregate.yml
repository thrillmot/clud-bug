name: logmind decision aggregator

# When a PR is merged, append a one-line summary entry to docs/decisions.md
# linking the PR and the per-branch decision log written during the feature
# branch. Installed by `logmind init`.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write   # fallback when direct push to base is blocked by branch protection

jobs:
  aggregate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install logmind
        run: pip install logmind

      - name: Aggregate merged-branch decisions
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: python -m logmind.actions.aggregate

      - name: Commit and push (or open PR if base is protected)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if git diff --quiet docs/decisions.md; then
            echo "No aggregation changes to commit."
            exit 0
          fi
          git config user.name "logmind-bot"
          git config user.email "logmind@users.noreply.github.com"
          git add docs/decisions.md
          git commit -m "logmind: aggregate decisions from #${PR_NUMBER}"

          # Try direct push; if branch protection rejects it, fall back to a PR
          # so the aggregation still lands (just gated on a maintainer merge).
          if git push 2>/tmp/push.err; then
            echo "✓ Aggregated directly to ${BASE_REF}"
            exit 0
          fi
          if grep -qE "protected branch|cannot lock ref|GH013" /tmp/push.err; then
            BRANCH="logmind/aggregate-${PR_NUMBER}"
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            gh pr create \
              --base "$BASE_REF" \
              --head "$BRANCH" \
              --title "logmind: aggregate decisions from #${PR_NUMBER}" \
              --body "Auto-aggregation. Direct push to ${BASE_REF} was blocked by branch protection — opening as a PR instead. Merge to land the decision-log update."
            exit 0
          fi
          # Some other push failure — surface it.
          cat /tmp/push.err
          exit 1
